---
version: '2'

linters:
  default: all
  disable:
    - depguard
    - exhaustruct
    - tagliatelle
    - noinlineerr
    - wsl
    - cyclop
    - nolintlint
    - gomodguard # replaced by gomodguard_v2 in golangci-lint v2.12; default:all already enables the v2 successor.
  settings:
    wsl_v5:
      allow-first-in-block: true
      allow-whole-block: false
      branch-max-lines: 2
    revive:
      enable-all-rules: true
      rules:
        - name: package-comments
          disabled: true
        - name: line-length-limit
          arguments: [ 120 ]
        - name: confusing-results
          disabled: true
        - name: add-constant
          disabled: true
        - name: function-length
          arguments:
            - 50
            - 100
        - name: cognitive-complexity
          arguments: [ 20 ]
        - name: cyclomatic
          arguments: [ 15 ]
    mnd:
      ignored-numbers: [ 0,1,2,3 ]
    funlen:
      lines: 120

formatters:
  enable:
    - gci
    - gofmt
